<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Welcome to My Portfolio</h1>
    <a href="#projects" class="btn-primary">Explore</a>
  </section>

  <!-- PROJECTS -->
  <section id="projects" class="projects">
    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Project 1</h3>
      <p>This is my first project</p>
      <button class="btn-primary">View</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Project 2</h3>
      <p>This is my second project</p>
      <button class="btn-primary">View</button>
    </div>
  </section>

  <!-- CONTACT FORM -->
  <section class="contact">
    <h2>Contact Me</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email" required>
      <button class="btn-primary">Submit</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
  <div>About</div>
  <div>Links</div>
  <div>Contact</div>

  <div class="social">
    <h3>Follow Me</h3>
    <a href="https://github.com/fabby442" target="_blank">GitHub</a><br>
    <a href="https://instagram.com/newfaceoffabby" target="_blank">Instagram</a>
  </div>
</footer>

</body>
</html>
